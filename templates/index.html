<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cabinet de Maître Boubou</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0F172A;
  --bg-secondary: #1E293B;
  --gold: #C6A75E;
  --gold-hover: #D4B873;
  --text-primary: #F8FAFC;
  --text-secondary: #CBD5E1;
  --border-gold: rgba(198,167,94,0.25);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top center, #1E293B 0%, #0F172A 60%);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
header {
  padding: 16px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border-gold);
  flex-shrink: 0;
  z-index: 100;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon {
  width:34px; height:34px;
  border:1px solid var(--gold);
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:16px;
}
.logo-text { font-family:'Playfair Display',serif; font-size:18px; }
.logo-text span { color:var(--gold); }
.header-right { display:flex; align-items:center; gap:24px; }
.status {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:var(--text-secondary);
}
.status-dot {
  width:8px; height:8px; border-radius:50%;
  background:#22c55e;
  box-shadow: 0 0 6px #22c55e;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.hist-btn {
  display:flex; align-items:center; gap:6px;
  background: rgba(198,167,94,0.1);
  border: 1px solid var(--border-gold);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--gold);
  font-size: 13px;
  cursor: pointer;
  transition: 0.3s;
  font-family: 'Inter', sans-serif;
}
.hist-btn:hover { background: rgba(198,167,94,0.2); }

/* HISTORIQUE PANEL */
.hist-panel {
  display: none;
  position: fixed;
  top: 70px; right: 0;
  width: 320px;
  height: calc(100vh - 70px);
  background: #1a2540;
  border-left: 1px solid var(--border-gold);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.hist-panel::-webkit-scrollbar { width:3px; }
.hist-panel::-webkit-scrollbar-thumb { background:var(--border-gold); border-radius:10px; }
.hist-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:16px;
}
.hist-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); }
.hist-actions { display:flex; gap:10px; align-items:center; }
.hist-clear {
  background:none; border:none;
  color:rgba(203,213,225,0.4); font-size:12px;
  cursor:pointer; transition:0.3s;
}
.hist-clear:hover { color:#f87171; }
.hist-close {
  background:none; border:none;
  color:rgba(203,213,225,0.4); font-size:18px;
  cursor:pointer; transition:0.3s; line-height:1;
}
.hist-close:hover { color:var(--text-primary); }
.hist-item {
  background: var(--bg-dark);
  border: 1px solid rgba(198,167,94,0.15);
  border-radius: 8px; padding:12px;
  margin-bottom: 8px; cursor:pointer; transition:0.3s;
}
.hist-item:hover { border-color: var(--border-gold); }
.hist-item-q { font-size:13px; color:var(--text-primary); margin-bottom:4px; line-height:1.4; }
.hist-item-date { font-size:11px; color:rgba(203,213,225,0.35); }
.hist-empty { text-align:center; color:rgba(203,213,225,0.35); font-size:13px; margin-top:40px; }

/* CHAT */
.chat-container {
  flex: 1; overflow-y: auto;
  padding: 30px 20px;
  display: flex; flex-direction: column; gap: 20px;
  max-width: 860px; width: 100%; margin: 0 auto;
  transition: 0.3s;
}
.chat-container::-webkit-scrollbar { width:4px; }
.chat-container::-webkit-scrollbar-thumb { background:var(--border-gold); border-radius:10px; }

/* WELCOME */
.welcome { text-align:center; padding:40px 20px; animation:fadeUp 0.5s ease; }
.welcome h1 { font-family:'Playfair Display',serif; font-size:34px; margin-bottom:10px; }
.welcome h1 span { color:var(--gold); }
.welcome p { color:var(--text-secondary); font-size:14px; margin-bottom:28px; line-height:1.6; }
.suggestions { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
.suggestion-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border-gold);
  border-radius: 20px; padding:8px 16px;
  color: var(--text-secondary); font-size:13px;
  cursor:pointer; transition:0.3s;
  font-family:'Inter',sans-serif;
}
.suggestion-btn:hover { border-color:var(--gold); color:var(--gold); }

/* MESSAGES */
.message {
  display:flex; gap:12px;
  animation:fadeUp 0.3s ease;
  max-width: 85%;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.message.user { align-self:flex-end; flex-direction:row-reverse; }
.message.ai { align-self:flex-start; }
.avatar {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0;
}
.avatar.ai { background:var(--bg-secondary); border:1px solid var(--border-gold); color:var(--gold); }
.avatar.user { background:var(--gold); color:var(--bg-dark); font-size:12px; font-weight:600; }
.bubble {
  padding:14px 18px; border-radius:16px;
  font-size:14px; line-height:1.7; max-width:100%;
}
.message.user .bubble {
  background:var(--gold); color:var(--bg-dark);
  border-bottom-right-radius:4px; font-weight:500;
}
.message.ai .bubble {
  background:var(--bg-secondary);
  border:1px solid var(--border-gold);
  color:var(--text-primary);
  border-bottom-left-radius:4px;
}
.sources {
  margin-top:12px; padding-top:12px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex; flex-wrap:wrap; gap:6px;
}
.source-tag {
  font-size:11px; padding:3px 10px;
  background:rgba(198,167,94,0.1);
  border:1px solid var(--border-gold);
  border-radius:20px; color:var(--gold);
}

/* TYPING */
.typing-indicator {
  display:flex; gap:5px; padding:14px 18px;
  background:var(--bg-secondary);
  border:1px solid var(--border-gold);
  border-radius:16px; border-bottom-left-radius:4px;
  width:fit-content;
}
.typing-dot {
  width:7px; height:7px; background:var(--gold);
  border-radius:50%; animation:typing 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

/* INPUT */
.input-area {
  flex-shrink:0; padding:16px 20px 20px;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border-gold);
}
.input-wrapper {
  max-width:860px; margin:0 auto;
  display:flex; align-items:flex-end; gap:12px;
  background:var(--bg-secondary);
  border:1px solid var(--border-gold);
  border-radius:14px; padding:12px 16px; transition:0.3s;
}
.input-wrapper:focus-within {
  border-color:var(--gold);
  box-shadow:0 0 15px rgba(198,167,94,0.2);
}
textarea {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text-primary); font-size:14px;
  font-family:'Inter',sans-serif; resize:none;
  max-height:120px; min-height:24px; line-height:1.5;
}
textarea::placeholder { color:rgba(203,213,225,0.4); }
.send-btn {
  width:38px; height:38px; border-radius:10px; border:none;
  background:linear-gradient(135deg,#C6A75E,#D4B873);
  color:var(--bg-dark); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; transition:0.3s; flex-shrink:0;
}
.send-btn:hover { transform:scale(1.05); box-shadow:0 4px 15px rgba(198,167,94,0.4); }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.input-hint {
  text-align:center; font-size:11px;
  color:rgba(203,213,225,0.3); margin-top:8px;
  max-width:860px; margin-left:auto; margin-right:auto;
}

/* RESPONSIVE */
@media(max-width:600px) {
  header { padding:14px 16px; }
  .logo-text { font-size:14px; }
  .hist-panel { width:100%; }
  .chat-container { padding:16px 12px; }
  .message { max-width:95%; }
  .welcome h1 { font-size:24px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚖</div>
    <div class="logo-text">Cabinet de <span>Maître Boubou</span></div>
  </div>
  <div class="header-right">
    <div class="status">
      <div class="status-dot"></div>
      Assistant actif
    </div>
    <button class="hist-btn" onclick="toggleHistorique()">📋 Historique</button>
  </div>
</header>

<!-- PANNEAU HISTORIQUE -->
<div class="hist-panel" id="histPanel">
  <div class="hist-header">
    <div class="hist-title">Historique</div>
    <div class="hist-actions">
      <button class="hist-clear" onclick="clearHistorique()">Effacer tout</button>
      <button class="hist-close" onclick="toggleHistorique()">✕</button>
    </div>
  </div>
  <div id="historiqueList"></div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <h1>Intelligence <span>Juridique</span></h1>
    <p>Posez votre question en langage naturel — je consulte la base documentaire juridique camerounaise et vous réponds avec précision.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="useSuggestion(this)">Obligations du gérant d'une SARL selon l'OHADA</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Procédure de licenciement au Cameroun</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Conditions de validité d'un contrat</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Droits du locataire en droit camerounais</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="questionInput" placeholder="Posez votre question juridique..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Entrée pour envoyer · Shift+Entrée pour un saut de ligne</div>
</div>

<script>
const API_URL = "https://web-production-bf6e1.up.railway.app/question";
const HIST_URL = "https://web-production-bf6e1.up.railway.app/historique";

const chatContainer = document.getElementById("chatContainer");
const input = document.getElementById("questionInput");
const sendBtn = document.getElementById("sendBtn");

// Auto-resize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Historique
function toggleHistorique() {
  const panel = document.getElementById("histPanel");
  const visible = panel.style.display === "block";
  panel.style.display = visible ? "none" : "block";
  if (!visible) loadHistorique();
}

async function loadHistorique() {
  const list = document.getElementById("historiqueList");
  list.innerHTML = '<div class="hist-empty">Chargement...</div>';
  try {
    const res = await fetch(HIST_URL);
    const data = await res.json();
    if (!data.length) {
      list.innerHTML = '<div class="hist-empty">Aucune conversation</div>';
      return;
    }
    list.innerHTML = data.map(h => `
      <div class="hist-item" onclick="reuseQuestion('${h.question.replace(/'/g,"\\'")}')">
        <div class="hist-item-q">${h.question.length > 80 ? h.question.substring(0,80)+"..." : h.question}</div>
        <div class="hist-item-date">${h.date}</div>
      </div>
    `).join("");
  } catch(e) {
    list.innerHTML = '<div class="hist-empty">Erreur de chargement</div>';
  }
}

async function saveHistorique(question, reponse) {
  try {
    await fetch(HIST_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, reponse })
    });
  } catch(e) {}
}

async function clearHistorique() {
  if (!confirm("Effacer tout l'historique ?")) return;
  try {
    await fetch(HIST_URL, { method: "DELETE" });
    loadHistorique();
  } catch(e) {}
}

function reuseQuestion(q) {
  input.value = q;
  toggleHistorique();
  input.focus();
}

function useSuggestion(btn) {
  input.value = btn.textContent;
  input.focus();
  sendMessage();
}

function addMessage(role, text, sources = []) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const msg = document.createElement("div");
  msg.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === "ai" ? "⚖" : "AV";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text.replace(/\n/g, "<br>");

  if (sources.length > 0) {
    const src = document.createElement("div");
    src.className = "sources";
    src.innerHTML = sources.map(s => `<span class="source-tag">📎 ${s}</span>`).join("");
    bubble.appendChild(src);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addTyping() {
  const wrapper = document.createElement("div");
  wrapper.className = "message ai";
  wrapper.id = "typing";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai";
  avatar.textContent = "⚖";

  const indicator = document.createElement("div");
  indicator.className = "typing-indicator";
  indicator.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;

  wrapper.appendChild(avatar);
  wrapper.appendChild(indicator);
  chatContainer.appendChild(wrapper);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const q = input.value.trim();
  if (!q) return;

  addMessage("user", q);
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;
  addTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    removeTyping();
    addMessage("ai", data.reponse || "Aucune reponse recue.", data.sources || []);
    saveHistorique(q, data.reponse || "");
  } catch(err) {
    removeTyping();
    addMessage("ai", "Erreur de connexion au serveur. Verifiez que votre serveur Python est lance sur localhost:5000.");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
